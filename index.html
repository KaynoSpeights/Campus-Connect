<!DOCTYPE html>
<html>
<head>
<title>Campus Connect</title>
<link rel="stylesheet" href="styles.css">
</head>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin: 40px;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    width:250px;
}

select{
    padding:10px;
}

</style>
</head>

<body>

<h1>Campus Connect</h1>

<p>
Welcome to Campus Connect! <br>
Find local small businesses and connect with your campus community.
</p>

<!-- SEARCH BAR -->
<h3>Search for a Service</h3>

<input type="text" id="searchBar" list="suggestions" placeholder="Search services...">

<datalist id="suggestions">
<option value="Hair Braiding">
<option value="Haircuts">
<option value="Nails">
<option value="Home Cooked Meals">
<option value="Tutoring">
<option value="Photography">
<option value="Laundry Help">
<option value="Tech Help">
</datalist>

<button onclick="searchService()">Search</button>

<br><br>

<!-- DROPDOWN MENU -->

<h3>Browse by Category</h3>

<select id="category">
<option value="">Select a category</option>
<option value="Hair Services">Hair Services</option>
<option value="Beauty">Beauty</option>
<option value="Food">Food</option>
<option value="Tutoring">Tutoring</option>
<option value="Tech Help">Tech Help</option>
</select>

<button onclick="browseCategory()">Browse</button>

<br><br>

<!-- QUICK ACCESS BUTTONS -->

<h3>Popular Services</h3>

<button onclick="quickSearch('Hair Braiding')">Hair Braiding</button>
<button onclick="quickSearch('Nails')">Nail Tech</button>
<button onclick="quickSearch('Home Cooked Meals')">Home Cooked Meals</button>
<button onclick="quickSearch('Tutoring')">Tutoring</button>

<script>

function searchService(){
    let service = document.getElementById("searchBar").value;
    alert("Searching for: " + service);
}

function browseCategory(){
    let category = document.getElementById("category").value;
    alert("Browsing category: " + category);
}

function quickSearch(service){
    alert("Searching for: " + service);
}

</script>

</body>
</html>
